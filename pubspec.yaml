name: saas_app
description: A subscription-based SaaS app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  window_size: ^0.1.0
  image_picker: ^1.0.7
  supabase_flutter: ^2.0.0
  url_launcher: ^6.3.2
  app_links: ^6.3.0
  http: ^1.6.0
  camera: 0.10.5+9
  permission_handler: 11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/flags/
    - assets/icons/

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
